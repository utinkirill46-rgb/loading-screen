<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX CITY5 - Загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Твой кастомный фон на весь экран */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('background.jpg') no-repeat center center;
            background-size: cover;
            filter: brightness(0.7) contrast(1.1);
            z-index: -2;
        }

        /* Затемнение */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(10,10,20,0.6), rgba(10,10,20,0.8));
            z-index: -1;
        }

        /* Логотип слева вверху */
        .logo-container {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 10;
            animation: fadeInLeft 1s ease-out;
        }

        @keyframes fadeInLeft {
            from { 
                opacity: 0; 
                transform: translateX(-30px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        .logo {
            width: 200px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255, 140, 0, 0.6));
            animation: logoGlow 3s ease-in-out infinite;
        }

        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(255, 140, 0, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(0, 150, 255, 0.7)); }
        }

        /* Информация о сервере справа внизу */
        .server-info {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(0, 0, 0, 0.7);
            padding: 25px 35px;
            border-radius: 15px;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 140, 0, 0.2);
            backdrop-filter: blur(10px);
            min-width: 300px;
            animation: fadeInRight 1s ease-out 0.3s both;
        }

        @keyframes fadeInRight {
            from { 
                opacity: 0; 
                transform: translateX(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        .server-title {
            font-size: 32px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #ff8c00, #ffa500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 3s linear infinite;
            letter-spacing: 2px;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .server-subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #ff8c00;
            font-weight: 600;
            font-size: 15px;
        }

        .info-value {
            color: #fff;
            font-size: 15px;
            font-weight: 500;
        }

        /* Индикатор загрузки по центру внизу */
        .loading-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 140, 0, 0.2);
            border-top: 4px solid #ff8c00;
            border-radius: 50%;
            margin: 0 auto 15px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 15px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .progress-container {
            width: 400px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff8c00, #ffa500, #ff6b00);
            background-size: 200% 100%;
            animation: progress 4s ease-out infinite, gradient 2.5s linear infinite;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.5);
        }

        @keyframes progress {
            0% { width: 0%; }
            60% { width: 80%; }
            100% { width: 100%; }
        }

        @keyframes gradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* LEGACY бейдж */
        .legacy-badge {
            position: absolute;
            bottom: 40px;
            left: 40px;
            padding: 6px 16px;
            background: rgba(255, 140, 0, 0.15);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 6px;
            font-size: 12px;
            color: #ff8c00;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Адаптив для маленьких экранов */
        @media (max-width: 768px) {
            .logo {
                width: 150px;
            }
            .server-info {
                position: relative;
                bottom: auto;
                right: auto;
                margin: 20px;
                margin-top: 250px;
            }
            .loading-container {
                bottom: 20px;
            }
            .progress-container {
                width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Логотип слева вверху -->
    <div class="logo-container">
        <img src="logo.png" alt="FLUX" class="logo">
    </div>

    <!-- Информация о сервере справа внизу -->
    <div class="server-info">
        <h1 class="server-title">FLUX CITY5</h1>
        <div class="server-subtitle">Half-Life 2 Roleplay</div>
        
        <div class="info-row">
            <span class="info-label">🎮 Режим:</span>
            <span class="info-value">HL2RP</span>
        </div>
        <div class="info-row">
            <span class="info-label">📌 Карта:</span>
            <span class="info-value">rp_city5_*</span>
        </div>
        <div class="info-row">
            <span class="info-label">👥 Игроков:</span>
            <span class="info-value">0/128</span>
        </div>
        <div class="info-row">
            <span class="info-label">🌐 Статус:</span>
            <span class="info-value" style="color: #00ff88;">● Онлайн</span>
        </div>
    </div>

    <!-- Индикатор загрузки по центру внизу -->
    <div class="loading-container">
        <div class="loader"></div>
        <div class="loading-text">Загрузка ресурсов...</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- LEGACY бейдж слева внизу -->
    <div class="legacy-badge">⚡ LEGACY ⚡</div>
</body>
</html>
