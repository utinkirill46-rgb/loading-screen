<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUX CITY5 - Загрузка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Твой фон на весь экран */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('background.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* Затемнение фона */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        /* Логотип слева вверху */
        .logo-container {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 10;
            animation: fadeInLeft 1s ease-out;
        }

        @keyframes fadeInLeft {
            from { 
                opacity: 0; 
                transform: translateX(-30px); 
            }
            to { 
                opacity: 1; 
                transform: translateX(0); 
            }
        }

        .logo {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(0, 150, 255, 0.6));
        }

        /* Центральная часть с названием */
        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .welcome-text {
            font-size: 18px;
            color: #ff8c00;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-transform: uppercase;
            opacity: 0.9;
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .server-name {
            font-size: 72px;
            font-weight: 900;
            color: #fff;
            text-shadow: 
                0 0 20px rgba(255, 140, 0, 0.8),
                0 0 40px rgba(255, 140, 0, 0.5),
                0 4px 8px rgba(0, 0, 0, 0.8);
            letter-spacing: 4px;
            margin-bottom: 15px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { 
                text-shadow: 
                    0 0 20px rgba(255, 140, 0, 0.8),
                    0 0 40px rgba(255, 140, 0, 0.5),
                    0 4px 8px rgba(0, 0, 0, 0.8);
            }
            50% { 
                text-shadow: 
                    0 0 30px rgba(255, 140, 0, 1),
                    0 0 60px rgba(255, 140, 0, 0.8),
                    0 4px 8px rgba(0, 0, 0, 0.8);
            }
        }

        .server-mode {
            font-size: 20px;
            color: #ccc;
            letter-spacing: 6px;
            text-transform: uppercase;
            opacity: 0.85;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        /* Информация о сервере (справа или по центру) */
        .server-info {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            border-radius: 10px;
            border: 1px solid rgba(255, 140, 0, 0.3);
            backdrop-filter: blur(5px);
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translate(-50%, 20px); 
            }
            to { 
                opacity: 1; 
                transform: translate(-50%, 0); 
            }
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 8px 0;
            gap: 40px;
        }

        .info-label {
            color: #ff8c00;
            font-weight: 600;
            font-size: 14px;
            min-width: 100px;
            text-align: left;
        }

        .info-value {
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            text-align: right;
        }

        /* Индикатор загрузки внизу по центру */
        .loading-container {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            width: 600px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .loading-text {
            font-size: 14px;
            color: #ff8c00;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(255, 140, 0, 0.3);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff8c00, #ffa500, #ff6b00);
            background-size: 200% 100%;
            animation: progress 4s ease-out infinite, gradient 2.5s linear infinite;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.6);
        }

        @keyframes progress {
            0% { width: 0%; }
            60% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes gradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Lambda символ слева внизу */
        .lambda {
            position: absolute;
            bottom: 80px;
            left: 40px;
            width: 50px;
            height: 50px;
            opacity: 0.6;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Tip текст внизу */
        .tip-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            max-width: 600px;
            animation: fadeIn 1s ease-out 1s both;
        }

        .tip-label {
            color: #ff8c00;
            font-weight: 600;
            margin-right: 8px;
        }

        /* LEGACY бейдж */
        .legacy-badge {
            position: absolute;
            bottom: 40px;
            right: 40px;
            padding: 6px 16px;
            background: rgba(255, 140, 0, 0.15);
            border: 1px solid rgba(255, 140, 0, 0.3);
            border-radius: 6px;
            font-size: 11px;
            color: #ff8c00;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .server-name {
                font-size: 42px;
            }
            .server-mode {
                font-size: 14px;
                letter-spacing: 3px;
            }
            .logo {
                width: 120px;
            }
            .server-info {
                width: 90%;
                padding: 15px 20px;
            }
            .loading-container {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- Фон -->
    <div class="background"></div>
    <div class="overlay"></div>

    <!-- Логотип слева вверху -->
    <div class="logo-container">
        <img src="logo.png" alt="FLUX" class="logo">
    </div>

    <!-- Центральная часть -->
    <div class="center-content">
        <div class="welcome-text">Welcome to</div>
        <h1 class="server-name">FLUX CITY5</h1>
        <div class="server-mode">Half-Life 2 Roleplay</div>
    </div>

    <!-- Информация о сервере -->
    <div class="server-info">
        <div class="info-row">
            <span class="info-label">🎮 Режим:</span>
            <span class="info-value">HL2RP</span>
        </div>
        <div class="info-row">
            <span class="info-label">📌 Карта:</span>
            <span class="info-value">rp_city5_*</span>
        </div>
        <div class="info-row">
            <span class="info-label">👥 Игроков:</span>
            <span class="info-value">0/128</span>
        </div>
        <div class="info-row">
            <span class="info-label">🌐 Статус:</span>
            <span class="info-value" style="color: #00ff88;">● Онлайн</span>
        </div>
    </div>

    <!-- Загрузка -->
    <div class="loading-container">
        <div class="loading-text">Downloading addons...</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- Lambda символ -->
    <svg class="lambda" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L80 90 L65 90 L50 50 L35 90 L20 90 Z" fill="#ff8c00" opacity="0.8"/>
    </svg>

    <!-- Tip текст -->
    <div class="tip-container">
        <span class="tip-label">TIP:</span>
        <span>Follow the server rules and report any bugs</span>
    </div>

    <!-- LEGACY бейдж -->
    <div class="legacy-badge">⚡ LEGACY ⚡</div>
</body>
</html>
