<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>λ Flux City5 | HL2RP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        /* Видео на весь экран */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Затемнение */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            pointer-events: none;
        }

        /* Логотип слева вверху */
        .logo {
            position: absolute;
            top: 30px;
            left: 40px;
            width: 150px;
            height: auto;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(0, 150, 255, 0.5));
            animation: fadeInLeft 1s ease-out;
        }

        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Название сервера по центру вверху */
        .server-name {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 700;
            color: #ff8c00;
            text-shadow: 0 0 15px rgba(255, 140, 0, 0.8);
            letter-spacing: 3px;
            z-index: 10;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        /* Текст с призывом внизу по центру */
        .prompt {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            font-weight: 600;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(255, 140, 0, 0.9),
                0 0 20px rgba(255, 140, 0, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.9);
            letter-spacing: 2px;
            animation: pulse 1.5s ease-in-out infinite;
            z-index: 10;
            text-align: center;
            padding: 18px 35px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            border: 2px solid rgba(255, 140, 0, 0.5);
            min-width: 400px;
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 1; 
                text-shadow: 0 0 10px rgba(255, 140, 0, 0.9), 0 0 20px rgba(255, 140, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.9);
                transform: translateX(-50%) scale(1);
            }
            50% { 
                opacity: 0.85; 
                text-shadow: 0 0 20px rgba(255, 140, 0, 1), 0 0 40px rgba(255, 140, 0, 0.8), 0 2px 4px rgba(0, 0, 0, 0.9);
                transform: translateX(-50%) scale(1.02);
            }
        }

        @keyframes fadeOut {
            to { 
                opacity: 0; 
                transform: translateX(-50%) translateY(20px);
            }
        }

        /* Индикатор загрузки внизу */
        .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #ff8c00, #ffa500, #ff6b00);
            width: 0%;
            animation: load 3s ease-out forwards;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.6);
        }

        @keyframes load {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Lambda символ слева внизу */
        .lambda {
            position: absolute;
            bottom: 50px;
            left: 40px;
            width: 50px;
            height: 50px;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards, pulseLambda 2s ease-in-out infinite;
        }

        @keyframes fadeIn {
            to { opacity: 0.6; }
        }

        @keyframes pulseLambda {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* LEGACY бейдж справа внизу */
        .legacy-badge {
            position: absolute;
            bottom: 50px;
            right: 40px;
            padding: 8px 20px;
            background: rgba(255, 140, 0, 0.15);
            border: 2px solid rgba(255, 140, 0, 0.4);
            border-radius: 6px;
            font-size: 12px;
            color: #ff8c00;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 700;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.7s forwards;
            box-shadow: 0 0 15px rgba(255, 140, 0, 0.3);
        }

        /* Адаптив для маленьких экранов */
        @media (max-width: 768px) {
            .prompt {
                font-size: 18px;
                bottom: 40px;
                padding: 14px 25px;
                min-width: 300px;
            }
            .logo {
                width: 100px;
                top: 20px;
                left: 20px;
            }
            .server-name {
                font-size: 20px;
                padding: 0 10px;
            }
            .lambda {
                width: 40px;
                height: 40px;
                bottom: 40px;
                left: 20px;
            }
            .legacy-badge {
                font-size: 10px;
                padding: 6px 15px;
                bottom: 40px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Видео (циклично) -->
    <div class="video-container">
        <video id="bgVideo" autoplay loop muted playsinline>
            <source src="video.mp4" type="video/mp4">
            Ваш браузер не поддерживает видео.
        </video>
        <div class="overlay"></div>
    </div>

    <!-- Логотип -->
    <img src="logo.png" alt="FLUX" class="logo" id="logo">

    <!-- Название сервера -->
    <div class="server-name">λ FLUX CITY5 | HL2RP</div>

    <!-- Текст с призывом -->
    <div class="prompt" id="prompt">
        ▶ Нажмите любую клавишу для возрождения
    </div>

    <!-- Lambda символ -->
    <svg class="lambda" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L80 90 L65 90 L50 50 L35 90 L20 90 Z" fill="#ff8c00"/>
    </svg>

    <!-- LEGACY бейдж -->
    <div class="legacy-badge">⚡ LEGACY ⚡</div>

    <!-- Индикатор загрузки -->
    <div class="loading-bar"></div>

    <script>
        // Флаг: нажал ли игрок клавишу
        let keyPressed = false;

        // Функция отправки сигнала на сервер
        function sendSpawnSignal() {
            // GMod HTML API
            if (window.lua && window.lua.Call) {
                window.lua.Call('LoadingScreen_KeyPressed', []);
            }
            // Fallback через gmod:// протокол
            try {
                fetch('gmod://LoadingScreen_KeyPressed');
            } catch(e) {
                console.log('GMod signal sent');
            }
        }

        // Обработчик нажатия любой клавиши
        function handleKeyPress(e) {
            if (keyPressed) return; // Уже нажал
            
            keyPressed = true;
            
            // Анимация исчезновения текста
            const prompt = document.getElementById('prompt');
            prompt.style.animation = 'fadeOut 0.4s ease-out forwards';
            
            // Отправляем сигнал на сервер
            sendSpawnSignal();
            
            // Убираем обработчики
            document.removeEventListener('keydown', handleKeyPress);
            document.removeEventListener('mousedown', handleKeyPress);
            document.removeEventListener('touchstart', handleKeyPress);
            
            console.log('[FLUX] Игрок нажал клавишу для спавна');
        }

        // Добавляем обработчики (клавиатура, мышь, тач)
        document.addEventListener('keydown', handleKeyPress);
        document.addEventListener('mousedown', handleKeyPress);
        document.addEventListener('touchstart', handleKeyPress);

        // Проверка загрузки видео
        const video = document.getElementById('bgVideo');
        
        video.addEventListener('loadeddata', function() {
            console.log('[FLUX] Видео загружено и готово');
        });

        video.addEventListener('loadedmetadata', function() {
            console.log('[FLUX] Видео метаданные загружены');
            console.log('[FLUX] Длительность: ' + video.duration + ' сек');
        });

        video.addEventListener('play', function() {
            console.log('[FLUX] Видео начало воспроизведение (циклично)');
        });

        video.addEventListener('error', function(e) {
            console.error('[FLUX] Ошибка загрузки видео:', e);
            // Запасной фон если видео не загрузилось
            document.body.style.background = 'linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%)';
            const prompt = document.getElementById('prompt');
            if (prompt) {
                prompt.style.background = 'rgba(0, 0, 0, 0.8)';
            }
        });

        // Автозапуск видео (для некоторых браузеров)
        window.addEventListener('load', function() {
            video.play().catch(function(error) {
                console.log('[FLUX] Автозапуск видео заблокирован браузером');
            });
        });
    </script>
</body>
</html>
